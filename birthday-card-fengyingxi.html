<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日快乐 · 冯颖希</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a0e08;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* ===== 星星背景 ===== */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    width: 3px; height: 3px;
    background: #ffe8c2;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    0% { opacity: 0.15; transform: scale(0.8); }
    100% { opacity: 1; transform: scale(1.3); }
  }

  /* ===== 漂浮气球 ===== */
  .balloon {
    position: fixed;
    bottom: -120px;
    width: 40px; height: 52px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    opacity: 0.7;
    animation: floatUp var(--speed) ease-in infinite;
    z-index: 0;
  }
  .balloon::after {
    content: '';
    position: absolute;
    bottom: -30px;
    left: 50%;
    width: 1px; height: 30px;
    background: rgba(255,255,255,0.3);
    transform: translateX(-50%);
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.7; }
    100% { transform: translateY(-110vh) rotate(15deg); opacity: 0; }
  }

  /* ===== 主卡片 ===== */
  .card {
    position: relative;
    z-index: 10;
    width: 90%;
    max-width: 420px;
    background: linear-gradient(145deg, #2e1a0e, #3d2214);
    border-radius: 24px;
    padding: 48px 32px 40px;
    box-shadow:
      0 0 60px rgba(232,101,10,0.15),
      0 20px 60px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,220,180,0.08);
    text-align: center;
    border: 1px solid rgba(232,101,10,0.12);
  }

  /* ===== 蜡烛区域 ===== */
  .candles {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-bottom: 28px;
  }
  .candle-wrap { display: flex; flex-direction: column; align-items: center; }
  .flame {
    width: 12px; height: 18px;
    background: radial-gradient(ellipse at bottom, #ffe066 0%, #ff9500 50%, transparent 100%);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    animation: flicker 0.3s ease-in-out infinite alternate;
    margin-bottom: 2px;
    filter: blur(0.5px);
    box-shadow: 0 0 12px 4px rgba(255,200,60,0.4);
  }
  .flame:nth-child(1) { animation-delay: 0s; }
  @keyframes flicker {
    0%   { transform: scaleY(1) scaleX(1) rotate(-2deg); opacity: 1; }
    50%  { transform: scaleY(1.15) scaleX(0.9) rotate(2deg); opacity: 0.85; }
    100% { transform: scaleY(0.95) scaleX(1.05) rotate(-1deg); opacity: 1; }
  }
  .candle-body {
    width: 10px; height: 44px;
    border-radius: 3px 3px 2px 2px;
    position: relative;
  }
  .candle-body::after {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    width: 1px; height: 6px;
    background: #555;
    transform: translateX(-50%) translateY(-4px);
  }

  /* ===== 标题 ===== */
  .title {
    font-size: 28px;
    font-weight: 700;
    color: #E8650A;
    margin-bottom: 6px;
    text-shadow: 0 0 20px rgba(232,101,10,0.3);
  }
  .subtitle {
    font-size: 13px;
    color: rgba(253,240,230,0.45);
    margin-bottom: 28px;
    letter-spacing: 2px;
  }

  /* ===== 分割线 ===== */
  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #E8650A, transparent);
    margin: 0 auto 28px;
  }

  /* ===== 文案 ===== */
  .message {
    font-size: 15px;
    line-height: 1.9;
    color: #FDF0E6;
    text-align: left;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeInUp 1.2s ease 0.5s forwards;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .signature {
    font-size: 14px;
    color: rgba(253,240,230,0.55);
    text-align: right;
    margin-top: 8px;
  }

  .date {
    font-size: 12px;
    color: rgba(253,240,230,0.3);
    margin-top: 20px;
    letter-spacing: 1px;
  }

  /* ===== 花瓣飘落 ===== */
  .petal {
    position: fixed;
    top: -20px;
    width: 10px; height: 10px;
    background: radial-gradient(ellipse, #E8650A 0%, #ff9966 100%);
    border-radius: 50% 0 50% 0;
    opacity: 0;
    z-index: 1;
    animation: petalFall var(--speed) linear infinite;
    animation-delay: var(--delay);
  }
  @keyframes petalFall {
    0%   { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; }
    10%  { opacity: 0.5; }
    90%  { opacity: 0.4; }
    100% { transform: translateY(105vh) rotate(360deg) scale(0.4); opacity: 0; }
  }
</style>
</head>
<body>

<!-- 星星 -->
<div class="stars" id="stars"></div>

<!-- 气球 -->
<div id="balloons"></div>

<!-- 花瓣 -->
<div id="petals"></div>

<!-- 主卡片 -->
<div class="card">
  <div class="candles">
    <div class="candle-wrap">
      <div class="flame"></div>
      <div class="candle-body" style="background:linear-gradient(180deg,#ff9966,#E8650A);"></div>
    </div>
    <div class="candle-wrap">
      <div class="flame" style="animation-delay:0.15s"></div>
      <div class="candle-body" style="background:linear-gradient(180deg,#ffcc99,#e88a3a);"></div>
    </div>
    <div class="candle-wrap">
      <div class="flame" style="animation-delay:0.08s"></div>
      <div class="candle-body" style="background:linear-gradient(180deg,#ff9966,#E8650A);"></div>
    </div>
  </div>

  <div class="title">生日快乐</div>
  <div class="subtitle">HAPPY BIRTHDAY</div>
  <div class="divider"></div>

  <div class="message">
    颖希：<br><br>
    从小学同桌到隔壁邻居，从一起上学放学到寒假并肩做志愿者——这些年兜兜转转，你一直在不远处。<br><br>
    小时候觉得住得近是理所当然，长大了才知道，能和一个人从童年走到现在，是很难得的事。<br><br>
    新的一岁，愿你被好运追着跑，想做的事都能痛快去做。
    <div class="signature">—— 你的老同学</div>
  </div>

  <div class="date" id="dateDisplay"></div>
</div>

<script>
// 自动注入日期
(function() {
  var now = new Date();
  var y = now.getFullYear();
  var m = String(now.getMonth() + 1).padStart(2, '0');
  var d = String(now.getDate()).padStart(2, '0');
  document.getElementById('dateDisplay').textContent = y + '.' + m + '.' + d;
})();

// 生成星星
(function() {
  var container = document.getElementById('stars');
  for (var i = 0; i < 60; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.setProperty('--dur', (1.5 + Math.random() * 2.5) + 's');
    s.style.animationDelay = Math.random() * 3 + 's';
    s.style.width = s.style.height = (2 + Math.random() * 2) + 'px';
    container.appendChild(s);
  }
})();

// 生成气球
(function() {
  var colors = ['#E8650A', '#ff9966', '#ffcc99', '#ff6633', '#ffaa55'];
  var container = document.getElementById('balloons');
  for (var i = 0; i < 6; i++) {
    var b = document.createElement('div');
    b.className = 'balloon';
    b.style.left = (8 + Math.random() * 84) + '%';
    b.style.background = colors[i % colors.length];
    b.style.setProperty('--speed', (8 + Math.random() * 10) + 's');
    b.style.animationDelay = Math.random() * 12 + 's';
    b.style.width = (32 + Math.random() * 16) + 'px';
    b.style.height = (42 + Math.random() * 18) + 'px';
    container.appendChild(b);
  }
})();

// 生成花瓣
(function() {
  var container = document.getElementById('petals');
  for (var i = 0; i < 15; i++) {
    var p = document.createElement('div');
    p.className = 'petal';
    p.style.left = Math.random() * 100 + '%';
    p.style.setProperty('--speed', (6 + Math.random() * 8) + 's');
    p.style.setProperty('--delay', Math.random() * 10 + 's');
    p.style.width = (6 + Math.random() * 8) + 'px';
    p.style.height = (6 + Math.random() * 8) + 'px';
    container.appendChild(p);
  }
})();
</script>
</body>
</html>
